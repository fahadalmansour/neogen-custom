<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0099cc" stroke-width="0.6" opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="#faf7f0"/>
  <rect width="1200" height="600" fill="url(#grid)"/>
  <!-- cyan corner inset -->
  <rect x="40" y="40" width="1120" height="520" fill="none" stroke="#0099cc" stroke-width="3"/>
  <!-- NG mark -->
  <image xlink:href="ng-mark.png" x="80" y="80" width="220" height="171"/>
  <!-- corner tag -->
  <text x="1120" y="80" text-anchor="end" font-family="'IBM Plex Mono',monospace" font-size="22" fill="#3a3a3a" letter-spacing="6">SYS · KSA</text>
  <!-- headline -->
  <text x="80" y="370" font-family="'Chakra Petch',sans-serif" font-weight="700" font-size="78" fill="#0b0b0b" letter-spacing="2">OPERATOR-CONSOLE</text>
  <text x="80" y="445" font-family="'Chakra Petch',sans-serif" font-weight="300" font-size="78" fill="#0099cc" letter-spacing="2">STOREFRONT</text>
  <!-- tagline -->
  <text x="80" y="510" font-family="'IBM Plex Mono',monospace" font-size="24" fill="#3a3a3a" letter-spacing="3">SMART-HOME · GAMING · DIGITAL LICENSES</text>
  <!-- footer mark -->
  <text x="80" y="550" font-family="'Chakra Petch',sans-serif" font-weight="700" font-size="28" fill="#0b0b0b" letter-spacing="6"><tspan>NEO</tspan><tspan fill="#0099cc">GEN</tspan><tspan font-family="'IBM Plex Mono',monospace" font-size="18" fill="#3a3a3a" font-weight="500" dx="14">STORE</tspan></text>
  <text x="1120" y="550" text-anchor="end" font-family="'IBM Plex Mono',monospace" font-size="18" fill="#3a3a3a">neogen.store</text>
</svg>
