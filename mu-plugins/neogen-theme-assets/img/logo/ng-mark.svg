<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" role="img" aria-label="NeoGen NG monogram">
  <!-- N: solid dark, three-piece geometric block -->
  <g fill="#0b0b0b">
    <!-- left vertical bar -->
    <rect x="10" y="10" width="20" height="80"/>
    <!-- right vertical bar -->
    <rect x="70" y="10" width="20" height="80"/>
    <!-- diagonal stroke from top-of-left to bottom-of-right -->
    <polygon points="30,10 50,10 90,90 70,90"/>
  </g>

  <!-- G: thin cyan outline, square-cornered with right-side bar opening -->
  <g fill="none" stroke="#0099cc" stroke-width="6" stroke-linejoin="miter" stroke-linecap="butt">
    <path d="M 190 22
             L 132 22
             Q 122 22 122 32
             L 122 68
             Q 122 78 132 78
             L 180 78
             Q 190 78 190 68
             L 190 52
             L 158 52" />
  </g>
</svg>
