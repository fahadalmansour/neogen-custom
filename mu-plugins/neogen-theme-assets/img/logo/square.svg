<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1000 1000" width="1000" height="1000">
  <rect width="1000" height="1000" fill="#ffffff"/>

  <!-- NG monogram — source PNG, centered upper portion (~520px wide preserves source aspect 108:84) -->
  <image xlink:href="ng-mark.png" x="240" y="170" width="520" height="404"/>

  <!-- divider tick -->
  <line x1="380" y1="640" x2="620" y2="640" stroke="#0099cc" stroke-width="3"/>

  <!-- NEOGEN wordmark -->
  <text x="500" y="770"
        text-anchor="middle"
        font-family="'Chakra Petch','IBM Plex Sans',sans-serif"
        font-size="140"
        letter-spacing="8"
        font-weight="700"><tspan fill="#0b0b0b" font-weight="300">NEO</tspan><tspan fill="#0099cc">GEN</tspan></text>

  <!-- STORE small label -->
  <text x="500" y="860"
        text-anchor="middle"
        font-family="'IBM Plex Mono',monospace"
        font-size="42"
        letter-spacing="14"
        fill="#3a3a3a">STORE</text>
</svg>
