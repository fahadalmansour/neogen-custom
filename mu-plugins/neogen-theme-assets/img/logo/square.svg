<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <rect width="1000" height="1000" fill="#ffffff"/>

  <!-- NG mark, centered upper portion, scaled up -->
  <g transform="translate(250 220) scale(2.5)">
    <g fill="#0b0b0b">
      <rect x="10" y="10" width="26" height="80"/>
      <polygon points="36,10 56,10 90,90 70,90"/>
    </g>
    <g fill="none" stroke="#0099cc" stroke-width="6" stroke-linejoin="miter">
      <path d="M 190 22 L 132 22 Q 122 22 122 32 L 122 68 Q 122 78 132 78 L 180 78 Q 190 78 190 68 L 190 52 L 158 52" />
    </g>
  </g>

  <!-- divider tick -->
  <line x1="380" y1="600" x2="620" y2="600" stroke="#0099cc" stroke-width="3"/>

  <!-- NEOGEN wordmark -->
  <text x="500" y="730"
        text-anchor="middle"
        font-family="'Chakra Petch','IBM Plex Sans',sans-serif"
        font-size="140"
        letter-spacing="8"
        font-weight="700"><tspan fill="#0b0b0b" font-weight="300">NEO</tspan><tspan fill="#0099cc">GEN</tspan></text>

  <!-- STORE small label -->
  <text x="500" y="820"
        text-anchor="middle"
        font-family="'IBM Plex Mono',monospace"
        font-size="42"
        letter-spacing="14"
        fill="#3a3a3a">STORE</text>
</svg>
