<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 240" width="1200" height="240">
  <rect width="1200" height="240" fill="#ffffff"/>

  <!-- NG monogram — source PNG, left side (preserves 108:84 aspect → height 160 / width 206) -->
  <image xlink:href="ng-mark.png" x="40" y="40" width="206" height="160"/>

  <!-- vertical divider -->
  <line x1="280" y1="60" x2="280" y2="180" stroke="#0099cc" stroke-width="3"/>

  <!-- NEOGEN wordmark -->
  <text x="320" y="150"
        font-family="'Chakra Petch','IBM Plex Sans',sans-serif"
        font-size="118"
        letter-spacing="6"
        font-weight="700"><tspan fill="#0b0b0b" font-weight="300">NEO</tspan><tspan fill="#0099cc">GEN</tspan><tspan fill="#3a3a3a" font-family="'IBM Plex Mono',monospace" font-size="44" letter-spacing="10" font-weight="500" dx="32">STORE</tspan></text>
</svg>
